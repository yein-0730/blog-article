// ─── API Helper ───────────────────────────────────────────────────────────────
async function callClaude({ apiKey, system, userPrompt, maxTokens = 4096, onStream, onDone, onError }) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "content-type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6-20250514",
        max_tokens: maxTokens,
        temperature: 0.7,
        stream: true,
        system,
        messages: [{ role: "user", content: userPrompt }],
      }),
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      if (response.status === 401) throw new Error("AUTH_ERROR");
      if (response.status === 429) throw new Error("RATE_LIMIT");
      throw new Error(`SERVER_ERROR:${response.status}`);
    }

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let fullText = "";
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop();
      for (const line of lines) {
        if (line.startsWith("data: ")) {
          const data = line.slice(6).trim();
          if (data === "[DONE]") continue;
          try {
            const parsed = JSON.parse(data);
            if (parsed.type === "content_block_delta" && parsed.delta?.text) {
              fullText += parsed.delta.text;
              if (onStream) onStream(fullText);
            }
          } catch {}
        }
      }
    }
    if (onDone) onDone(fullText);
  } catch (e) {
    if (onError) onError(e.message || "UNKNOWN");
  }
}

function parseJSON(text) {
  try {
    const cleaned = text.replace(/^```json\s*/i, "").replace(/\s*```\s*$/i, "").trim();
    return JSON.parse(cleaned);
  } catch {
    const match = text.match(/\{[\s\S]*\}/);
    if (match) {
      try { return JSON.parse(match[0]); } catch {}
    }
    return null;
  }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function Toast({ message, onHide }) {
  useEffect(() => {
    const t = setTimeout(onHide, 2200);
    return () => clearTimeout(t);
  }, []);
  return <div className="toast">{message}</div>;
}

// ─── StepIndicator ────────────────────────────────────────────────────────────
function StepIndicator({ current }) {
  const steps = ["주제 선택", "설정", "결과 확인"];
  return (
    <div className="flex items-center gap-0 justify-center py-4">
      {steps.map((label, i) => {
        const num = i + 1;
        const isActive = num === current;
        const isDone = num < current;
        return (
          <React.Fragment key={num}>
            <div className="flex items-center gap-2">
              <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold transition-all ${isActive ? "step-active" : isDone ? "step-done" : "step-inactive"}`}>
                {isDone ? "✓" : num}
              </div>
              <span className={`text-sm font-medium ${isActive ? "text-blue-700" : isDone ? "text-blue-600" : "text-gray-400"}`}>{label}</span>
            </div>
            {i < steps.length - 1 && <div className={`w-12 h-0.5 mx-2 ${num < current ? "bg-blue-600" : "bg-gray-200"}`} />}
          </React.Fragment>
        );
      })}
    </div>
  );
}

[출력 형식 - JSON만 출력, 다른 설명 없이]
{ "topics": [{ "title": "...", "reason": "...", "angle": "...", "keywords": ["..."] }] }`;

      apiKey,

          setTopics(parsed.topics);
        } else {
          setError("주제 파싱 오류가 발생했습니다. 다시 시도해주세요.");
        }
        setStreamText("");
        setLoading(false);
      },
      onError: (msg) => {
        if (msg === "AUTH_ERROR") setError("API 키를 확인해주세요.");
        else if (msg === "RATE_LIMIT") setError("요청 한도를 초과했습니다. 잠시 후 다시 시도해주세요.");
        else setError("네트워크 연결을 확인해주세요.");
        setLoading(false);
      },
    });
  }, [apiKey, reader, month]);

  useEffect(() => {
    if (apiKey) fetchTopics();
  }, []);

  const handleSelectTopic = (topic) => {
    onNext({ topic: topic.title, keywords: topic.keywords.join(", ") });
  };

  const handleDirectSubmit = () => {
    if (!directInput.trim()) return;
    onNext({ topic: directInput.trim(), keywords: "" });
  };

  return (
    <div className="fade-in">
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6 mb-4">

            </h2>
            <p className="text-sm text-gray-500 mt-0.5">{seasonal.context}</p>
          </div>
          <div className="flex items-center gap-3">
            <select
              value={reader}
              onChange={e => setReader(e.target.value)}

            >
              {READERS.map(r => <option key={r.value} value={r.value}>{r.value}</option>)}
            </select>
            <button
              onClick={fetchTopics}
              disabled={loading}
              className="flex items-center gap-1.5 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-60"
            >
              {loading ? <span className="spinner w-4 h-4 border-2" style={{width:16,height:16}}/> : "🤖"}
              AI 추천 주제
            </button>
          </div>
        </div>

        {error && (
          <div className="bg-red-50 border border-red-200 rounded-lg p-3 mb-4 text-sm text-red-700 flex items-center justify-between">
            <span>{error}</span>
            <button onClick={fetchTopics} className="text-red-600 underline ml-2">재시도</button>

        {loading && topics.length === 0 && (
          <div className="py-8 flex flex-col items-center gap-3">
            <div className="spinner"></div>
            <p className="text-sm text-gray-500">AI가 주제를 추천하고 있습니다...</p>
            {streamText && (
              <div className="w-full max-h-32 overflow-auto bg-gray-50 rounded-lg p-3 streaming-text text-xs">{streamText}</div>
            )}
          </div>
        )}

        {topics.length > 0 && (
          <div className="space-y-3">
            {topics.map((topic, i) => (
              <div key={i} className="border border-gray-200 rounded-xl p-4 hover:border-blue-300 hover:shadow-sm transition-all section-card group">
                <div className="flex items-start justify-between gap-4">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2 mb-1">
                      <span className="w-6 h-6 bg-blue-100 text-blue-700 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0">{i+1}</span>
                      <h3 className="font-semibold text-gray-800 text-sm">{topic.title}</h3>
                    </div>
                    <p className="text-xs text-gray-600 ml-8 mb-1">→ {topic.angle}</p>
                    <div className="ml-8 flex flex-wrap gap-1">
                      {(topic.keywords || []).map((kw, j) => (
                        <span key={j} className="bg-blue-50 text-blue-700 text-xs px-2 py-0.5 rounded-full">#{kw}</span>

                  <button

            <button

      <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6">

// ─── Markdown Renderer ────────────────────────────────────────────────────────
function MD({ text }) {
  const html = React.useMemo(() => {
    try { return { __html: marked.parse(text || "") }; } catch { return { __html: text || "" }; }
  }, [text]);
  return <div className="prose-content text-sm text-gray-700" dangerouslySetInnerHTML={html} />;
}

// ─── Section Card ─────────────────────────────────────────────────────────────
function SectionCard({ section, index, article, apiKey, systemPrompt, onUpdate, showToast }) {
  const [rewriting, setRewriting] = useState(false);
  const [feedbackOpen, setFeedbackOpen] = useState(false);
  const [feedback, setFeedback] = useState("");
  const [streamText, setStreamText] = useState("");
  const [error, setError] = useState(null);

  const sections = article.sections;
  const prevSection = sections[index - 1] || null;
  const nextSection = sections[index + 1] || null;
  const sectionHeadings = sections.map(s => s.heading).join(" → ");

  const buildRegenPrompt = (withFeedback = false) => {
    if (withFeedback) {
      return `[요청] 아래 아티클에서 섹션 "${section.heading}" (id: ${section.id})을 수정해주세요.

[사용자 피드백]
${feedback}

- 제목: ${article.title}

- 현재 섹션 내용: ${section.body}

[지시]
- 사용자 피드백을 최우선으로 반영하세요
- 전후 섹션과의 연결성을 유지하세요
- AEO/GEO 구조 원칙을 유지하세요
- 같은 JSON 구조(id, heading, directAnswer, body, keyPoint)로만 응답하세요`;
    }
    return `[요청] 아래 아티클에서 섹션 "${section.heading}" (id: ${section.id})만 다시 작성해주세요.

[현재 아티클 맥락]
- 제목: ${article.title}
- 전체 흐름: ${sectionHeadings}
- 이전 섹션 요약: ${prevSection ? prevSection.keyPoint : "없음"}
- 다음 섹션 요약: ${nextSection ? nextSection.keyPoint : "없음"}

[지시]
- 전후 섹션과의 논리적 연결을 유지하세요
- 기존 내용과 다른 관점이나 사례를 사용하세요
- AEO/GEO 구조 원칙을 유지하세요 (질문형 소제목, 직접 답변 첫 문장)
- 같은 JSON 구조(id, heading, directAnswer, body, keyPoint)로만 응답하세요`;
  };

  const doRewrite = async (withFeedback = false) => {
    setRewriting(true); setError(null); setStreamText("");
    await callClaude({

      maxTokens: 1024,
      onStream: t => setStreamText(t),
      onDone: t => {
        const parsed = parseJSON(t);
        if (parsed && parsed.id) {
          onUpdate(section.id, parsed);
          setFeedbackOpen(false); setFeedback(""); setStreamText("");
        } else {
          setError("파싱 오류. 다시 시도해주세요.");
        }
        setRewriting(false);
      },
      onError: msg => {
        setError(msg === "AUTH_ERROR" ? "API 키를 확인해주세요." : "오류가 발생했습니다. 다시 시도해주세요.");

  return (

        </div>

          <p className="text-sm font-semibold text-blue-800">{section.directAnswer}</p>

      {section.keyPoint && !rewriting && (
        <div className="mt-3 pt-3 border-t border-gray-100 flex items-start gap-2">
          <span className="text-gray-400 text-xs flex-shrink-0 mt-0.5">핵심</span>
          <p className="text-xs text-gray-600 italic">{section.keyPoint}</p>

      )}

      {error && <p className="text-xs text-red-600 mt-2">{error}</p>}

      {feedbackOpen && !rewriting && (
        <div className="mt-3 border-t border-gray-100 pt-3">
          <textarea
            value={feedback}
            onChange={e => setFeedback(e.target.value)}
            placeholder="수정 요청 사항을 입력하세요 (예: 통계 수치를 추가해주세요, 더 실용적인 예시가 필요합니다)"
            className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[80px]"
          />
          <div className="flex gap-2 mt-2">
            <button
              onClick={() => doRewrite(true)}
              disabled={!feedback.trim()}
              className="bg-blue-600 text-white px-4 py-1.5 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
            >
              수정 적용
            </button>
            <button onClick={() => setFeedbackOpen(false)} className="text-sm text-gray-500 hover:text-gray-700 px-3 py-1.5">취소</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Part Rewrite (intro/outro) ────────────────────────────────────────────────
function PartRewrite({ part, value, article, apiKey, systemPrompt, onUpdate, label }) {
  const [rewriting, setRewriting] = useState(false);
  const [streamText, setStreamText] = useState("");
  const [error, setError] = useState(null);

  const doRewrite = async () => {
    setRewriting(true); setError(null); setStreamText("");
    const keyPoints = (article.sections || []).map(s => s.keyPoint).join(", ");
    const introExtra = part === "intro"
      ? "- 독자가 \"이건 내 이야기다\"라고 느낄 수 있는 도입으로 시작하세요\n- 글 전체에서 얻을 수 있는 가치를 명확히 제시하세요"
      : "- 글의 핵심 인사이트를 1~2문장으로 압축하세요\n- 독자가 내일 당장 시도할 수 있는 구체적 행동을 1가지 제안하세요";

    const prompt = `[요청] 아티클의 ${part === "intro" ? "도입부" : "마무리"}을(를) 다시 작성해주세요.

[현재 아티클]
- 제목: ${article.title}
- 섹션 핵심 메시지들: ${keyPoints}

[지시]
${introExtra}

JSON으로만 응답하세요: {"text": "작성된 내용"}`;

    await callClaude({
      apiKey,
      system: systemPrompt + "\n\nJSON만 출력하세요.",
      userPrompt: prompt,
      maxTokens: 512,
      onStream: t => setStreamText(t),
      onDone: t => {
        const parsed = parseJSON(t);
        if (parsed?.text) {
          onUpdate(part, parsed.text);
        } else {
          setError("파싱 오류. 다시 시도해주세요.");
        }
        setStreamText(""); setRewriting(false);
      },
      onError: () => {
        setError("오류가 발생했습니다."); setRewriting(false);
      },
    });
  };

  return (
    <div className="border border-gray-200 rounded-xl p-5 mb-4 bg-white">
      <div className="flex items-center justify-between mb-3">
        <h3 className="font-bold text-gray-700 text-sm">{label}</h3>
        <button
          onClick={doRewrite}
          disabled={rewriting}
          className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg disabled:opacity-50"
        >
          🔄 다시쓰기
        </button>
      </div>
      {rewriting ? (
        <div>
          <div className="flex items-center gap-2 mb-2">
            <div className="spinner" style={{width:18,height:18,borderWidth:2}}></div>
            <span className="text-sm text-gray-500">다시 작성 중...</span>
          </div>
          {streamText && <div className="streaming-text text-xs bg-gray-50 rounded p-2 max-h-20 overflow-auto">{streamText}</div>}
        </div>
      ) : (
        <p className="text-sm text-gray-700 leading-relaxed">{value}</p>
      )}
      {error && <p className="text-xs text-red-600 mt-1">{error}</p>}
    </div>
  );
}

// ─── Step 3: Results ──────────────────────────────────────────────────────────
function Step3({ article, setArticle, apiKey, systemPrompt, onBack, showToast, rawText }) {
  const [tab, setTab] = useState("article");
  const tabs = [
    { id: "article", label: "📝 본문" },
    { id: "seo", label: "🔍 SEO·AEO·GEO" },
    { id: "visual", label: "🎨 시각화" },
  ];

  const updateSection = (id, newSection) => {
    setArticle(a => ({ ...a, sections: a.sections.map(s => s.id === id ? { ...s, ...newSection } : s) }));
  };
  const updatePart = (part, text) => {
    setArticle(a => ({ ...a, [part]: text }));
  };

  const buildMarkdown = () => {
    let md = `# ${article.title}\n\n`;
    md += `${article.intro}\n\n`;
    (article.sections || []).forEach(s => {
      md += `## ${s.heading}\n\n`;
      if (s.directAnswer) md += `**${s.directAnswer}**\n\n`;
      md += `${s.body}\n\n`;
    });
    md += `---\n\n${article.outro}\n\n`;
    if (article.faq?.length) {
      md += `## 자주 묻는 질문\n\n`;
      article.faq.forEach(q => { md += `**Q: ${q.question}**\n\n${q.answer}\n\n`; });
    }
    return md;
  };

  const buildHTML = () => {
    let h = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><title>${article.title}</title></head><body>\n`;
    h += `<h1>${article.title}</h1>\n<p>${article.intro}</p>\n`;
    (article.sections || []).forEach(s => {
      h += `<h2>${s.heading}</h2>\n`;
      if (s.directAnswer) h += `<p><strong>${s.directAnswer}</strong></p>\n`;
      try { h += marked.parse(s.body || "") + "\n"; } catch { h += `<p>${s.body}</p>\n`; }
    });
    h += `<hr><p>${article.outro}</p>\n`;
    if (article.faq?.length) {
      h += `<h2>자주 묻는 질문</h2>\n`;
      article.faq.forEach(q => { h += `<h3>Q: ${q.question}</h3>\n<p>${q.answer}</p>\n`; });
    }
    h += `</body></html>`;
    return h;
  };

  const buildSEOText = () => {
    const s = article.seo || {};
    return `Meta Title: ${s.metaTitle || ""}\n\nMeta Description: ${s.metaDesc || ""}\n\nPrimary Keyword: ${s.primaryKeyword || ""}\n\nSecondary Keywords: ${(s.secondaryKeywords || []).join(", ")}`;
  };

  const copyText = async (text, label) => {
    try {
      await navigator.clipboard.writeText(text);
      showToast(`${label} 복사되었습니다 ✓`);
    } catch {
      showToast("복사 실패. 다시 시도해주세요.");
    }
  };

  return (
    <div className="fade-in">
      <div className="bg-white rounded-xl border border-gray-200 shadow-sm mb-4 overflow-hidden">
        <div className="flex items-center justify-between px-5 pt-4 pb-0">
          <div className="flex items-center gap-2">
            <button onClick={onBack} className="text-gray-400 hover:text-gray-600 text-sm">← 뒤로</button>
            <h2 className="text-lg font-bold text-gray-800 line-clamp-1">{article.title}</h2>
          </div>
          <div className="flex gap-2">
            <button onClick={() => copyText(buildMarkdown(), "마크다운")} className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-gray-600">MD 복사</button>
            <button onClick={() => copyText(buildHTML(), "HTML")} className="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg text-gray-600">HTML 복사</button>
            <button onClick={() => copyText(buildSEOText(), "SEO 정보")} className="text-xs bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-blue-700">SEO 복사</button>
          </div>
        </div>

        <div className="flex border-b border-gray-200 px-5 mt-3">
          {tabs.map(t => (
            <button
              key={t.id}
              onClick={() => setTab(t.id)}
              className={`px-4 py-2.5 text-sm mr-1 transition-colors ${tab===t.id ? "tab-active" : "text-gray-500 hover:text-gray-700"}`}
            >
              {t.label}
            </button>
          ))}
        </div>

        <div className="p-5">
          {tab === "article" && (
            <div>
              <PartRewrite part="intro" value={article.intro} article={article} apiKey={apiKey} systemPrompt={systemPrompt} onUpdate={updatePart} label="도입부" />

              {(article.sections || []).map((section, i) => (
                <SectionCard
                  key={section.id}
                  section={section}
                  index={i}
                  article={article}
                  apiKey={apiKey}
                  systemPrompt={systemPrompt}
                  onUpdate={updateSection}
                  showToast={showToast}
                />
              ))}

              <PartRewrite part="outro" value={article.outro} article={article} apiKey={apiKey} systemPrompt={systemPrompt} onUpdate={updatePart} label="마무리" />

              {article.faq?.length > 0 && (
                <div className="border border-gray-200 rounded-xl p-5 bg-gray-50">
                  <h3 className="font-bold text-gray-700 text-sm mb-4">자주 묻는 질문 (FAQ)</h3>
                  <div className="space-y-4">
                    {article.faq.map((item, i) => (
                      <div key={i}>
                        <p className="font-semibold text-gray-800 text-sm mb-1">Q. {item.question}</p>
                        <p className="text-sm text-gray-600 leading-relaxed">{item.answer}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          {tab === "seo" && article.seo && (
            <div className="space-y-5">
              <div className="bg-blue-50 rounded-xl p-4">
                <p className="text-xs font-semibold text-blue-600 mb-1">Meta Title ({(article.seo.metaTitle||"").length}자)</p>
                <p className="font-semibold text-gray-800">{article.seo.metaTitle}</p>
              </div>
              <div className="bg-gray-50 rounded-xl p-4">
                <p className="text-xs font-semibold text-gray-600 mb-1">Meta Description ({(article.seo.metaDesc||"").length}자)</p>
                <p className="text-sm text-gray-700">{article.seo.metaDesc}</p>
              </div>
              <div>
                <p className="text-xs font-semibold text-gray-600 mb-2">키워드</p>
                <div className="flex flex-wrap gap-2">
                  <span className="bg-blue-100 text-blue-800 text-xs px-3 py-1 rounded-full font-medium">{article.seo.primaryKeyword} (주요)</span>
                  {(article.seo.secondaryKeywords || []).map((k,i) => (
                    <span key={i} className="bg-gray-100 text-gray-700 text-xs px-3 py-1 rounded-full">{k}</span>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                  <p className="text-xs font-semibold text-gray-600 mb-2">AEO 제안 (Answer Engine Optimization)</p>
                  <ul className="space-y-2">
                    {(article.seo.aeoTips || []).map((tip, i) => (
                      <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                        <span className="text-green-500 flex-shrink-0">✅</span>{tip}
                      </li>
                    ))}
                  </ul>
                </div>
                <div>
                  <p className="text-xs font-semibold text-gray-600 mb-2">GEO 제안 (Generative Engine Optimization)</p>
                  <ul className="space-y-2">
                    {(article.seo.geoTips || []).map((tip, i) => (
                      <li key={i} className="flex items-start gap-2 text-sm text-gray-700">
                        <span className="text-blue-500 flex-shrink-0">✅</span>{tip}
                      </li>
                    ))}
                  </ul>
                </div>
              </div>
            </div>
          )}

          {tab === "visual" && (
            <div className="space-y-4">
              {(article.visuals || []).map((v, i) => (
                <div key={i} className="border border-gray-200 rounded-xl p-4 bg-white">
                  <div className="flex items-start justify-between gap-4 mb-3">
                    <div>
                      <span className="text-xs bg-gray-100 text-gray-600 px-2 py-0.5 rounded font-mono">{v.section}</span>
                      <p className="text-sm font-medium text-gray-700 mt-1">{v.description}</p>
                    </div>
                    <button
                      onClick={() => copyText(v.prompt, "이미지 프롬프트")}
                      className="flex-shrink-0 text-xs bg-purple-50 hover:bg-purple-100 text-purple-700 px-3 py-1.5 rounded-lg"
                    >
                      프롬프트 복사
                    </button>
                  </div>
                  <div className="bg-gray-800 rounded-lg p-3">
                    <p className="text-xs text-green-400 font-mono leading-relaxed">{v.prompt}</p>
                  </div>
                </div>
              ))}
              {(!article.visuals || article.visuals.length === 0) && (
                <p className="text-sm text-gray-500 text-center py-8">시각화 데이터가 없습니다.</p>
              )}
            </div>
          )}
        </div>
      </div>

      {rawText && (
        <details className="bg-white rounded-xl border border-gray-200 shadow-sm">
          <summary className="px-5 py-3 text-sm text-gray-500 cursor-pointer hover:bg-gray-50 rounded-xl">원본 응답 보기 (디버그)</summary>
          <div className="px-5 pb-4">
            <pre className="streaming-text text-xs bg-gray-50 rounded-lg p-3 overflow-auto max-h-48">{rawText}</pre>
          </div>
        </details>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("hrd_api_key") || "");
  const [step, setStep] = useState(1);
  const [reader, setReader] = useState("HRD 담당자");
  const [topicData, setTopicData] = useState(null);
  const [settings, setSettings] = useState(null);
  const [article, setArticle] = useState(null);
  const [rawText, setRawText] = useState("");
  const [generating, setGenerating] = useState(false);
  const [streamText, setStreamText] = useState("");
  const [genError, setGenError] = useState(null);
  const [toast, setToast] = useState(null);
  const [systemPrompt, setSystemPrompt] = useState("");

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); };

  const handleStep1Next = (data) => {
    setTopicData(data);
    setStep(2);
  };

  const handleStep2Back = () => setStep(1);

  const handleGenerate = async (cfg) => {
    if (!apiKey) { showToast("API 키를 먼저 입력해주세요."); return; }
    setSettings(cfg);
    setGenerating(true);
    setGenError(null);
    setStreamText("");
    setArticle(null);
    setRawText("");

    const readerCtx = READERS.find(r => r.value === cfg.reader)?.context || "";
    const toneGuide = TONES[cfg.tone] || "";
    const sysPrompt = `${SYSTEM_PROMPT_BASE}

${toneGuide}

${COMMON_TONE}

[독자 직무 맥락]
${readerCtx}

JSON만 출력하세요. 다른 설명이나 마크다운 코드 블록 없이 순수 JSON만 출력하세요.`;
    setSystemPrompt(sysPrompt);

    const userPrompt = `[요청]
키워드/주제: ${topicData.topic}${topicData.keywords ? `\n관련 키워드: ${topicData.keywords}` : ""}
타겟 독자: ${cfg.reader}
목표 분량: 약 ${cfg.length}자
섹션 수: ${cfg.sectionCount}개

위 조건에 맞는 블로그 아티클을 아래 JSON 형식으로 작성해주세요.

[출력 형식 - JSON]
{
  "title": "블로그 제목 (30자 내외, 타겟 독자의 관심을 끄는 표현)",
  "intro": "도입부 (독자의 문제 인식 → 글의 가치 제안, 3~4문장)",
  "sections": [
    {
      "id": "sec_1",
      "heading": "질문형 소제목 (AEO: 사용자 검색 질문과 매칭)",
      "directAnswer": "소제목 질문에 대한 직접 답변 1~2문장 (AEO: Featured Snippet 채택 구간)",
      "body": "본문 (마크다운 지원: 볼드, 리스트, 인용 등). 정의형 문장, 테이블, 단계별 가이드를 적극 활용",
      "keyPoint": "이 섹션의 핵심 메시지 (1문장)"
    }
  ],
  "outro": "마무리 (핵심 요약 + 독자의 다음 행동 제안, 2~3문장)",
  "faq": [
    {
      "question": "타겟 독자가 검색할 만한 질문 (AEO)",
      "answer": "2~3문장의 간결하고 명확한 답변. 정의형 문장 포함 (GEO)"
    }
  ],
  "seo": {
    "metaTitle": "SEO 타이틀 (60자 이내)",
    "metaDesc": "메타 디스크립션 (155자 이내)",
    "primaryKeyword": "주요 키워드",
    "secondaryKeywords": ["보조 키워드 3~5개"],
    "aeoTips": ["AI/검색엔진 답변에 직접 채택되기 위한 구조 제안"],
    "geoTips": ["생성형 AI 답변에서 출처로 인용되기 위한 신뢰·권위 강화 제안"]
  },
  "visuals": [
    {
      "section": "sec_1",
      "description": "어떤 시각 자료가 필요한지 설명",
      "prompt": "이미지 생성 AI용 영문 프롬프트"
    }
  ]
}`;

    await callClaude({
      apiKey,
      system: sysPrompt,
      userPrompt,
      maxTokens: 4096,
      onStream: t => setStreamText(t),
      onDone: t => {
        setRawText(t);
        const parsed = parseJSON(t);
        if (parsed?.title) {
          setArticle(parsed);
          setStep(3);
        } else {
          setGenError("아티클 파싱에 실패했습니다. 원본 텍스트를 확인하거나 다시 시도해주세요.");
          setRawText(t);
        }
        setStreamText("");
        setGenerating(false);
      },
      onError: msg => {
        if (msg === "AUTH_ERROR") setGenError("API 키를 확인해주세요.");
        else if (msg === "RATE_LIMIT") setGenError("잠시 후 다시 시도해주세요.");
        else setGenError("네트워크 연결을 확인해주세요.");
        setGenerating(false);
      },
    });
  };

  return (
    <div className="max-w-3xl mx-auto px-4 py-6">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-gray-900 text-center">HRD 블로그 아티클 자동 작성기</h1>
        <p className="text-center text-sm text-gray-500 mt-1">B2B 교육업 전문 콘텐츠 · SEO/AEO/GEO 최적화</p>
      </div>

      <ApiKeyPanel apiKey={apiKey} setApiKey={setApiKey} />

      {!generating && step <= 3 && (
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm mb-4">
          <StepIndicator current={step} />
        </div>
      )}

      {generating ? (
        <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-8 text-center fade-in">
          <div className="spinner mx-auto mb-4"></div>
          <h3 className="text-base font-semibold text-gray-700 mb-2">아티클을 작성하고 있습니다...</h3>
          <p className="text-sm text-gray-500 mb-4">Claude AI가 HRD 전문 콘텐츠를 생성 중입니다</p>
          <div className="bg-gray-50 rounded-xl p-4 text-left max-h-64 overflow-auto">
            <div className="streaming-text text-xs">{streamText || "응답을 기다리는 중..."}</div>
          </div>
          {genError && (
            <div className="mt-4 bg-red-50 border border-red-200 rounded-lg p-3 text-sm text-red-700">{genError}</div>
          )}
        </div>
      ) : (
        <>
          {step === 1 && <Step1 apiKey={apiKey} onNext={handleStep1Next} reader={reader} setReader={setReader} />}
          {step === 2 && topicData && (
            <Step2
              topicData={topicData}
              reader={reader}
              setReader={setReader}
              onBack={handleStep2Back}
              onGenerate={handleGenerate}
            />
          )}
          {step === 3 && article && (
            <Step3
              article={article}
              setArticle={setArticle}
              apiKey={apiKey}
              systemPrompt={systemPrompt}
              onBack={() => setStep(2)}
              showToast={showToast}
              rawText={rawText}
            />
          )}
          {step === 3 && !article && genError && (
            <div className="bg-white rounded-xl border border-red-200 shadow-sm p-6 fade-in">
              <p className="text-red-700 font-medium mb-2">{genError}</p>
              {rawText && (
                <pre className="streaming-text text-xs bg-gray-50 rounded-lg p-3 overflow-auto max-h-48 mt-2">{rawText}</pre>
              )}
              <button
                onClick={() => { setGenError(null); setStep(2); }}
                className="mt-4 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-blue-700"
              >
                설정으로 돌아가기
              </button>
            </div>
          )}
        </>
      )}

      {toast && <Toast message={toast} onHide={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
